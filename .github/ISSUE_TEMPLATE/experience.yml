name: 面试或转专业经验投稿
description: 提交匿名化的准备过程、面试复盘或完整转专业经历
title: "[经验投稿] "
body:
  - type: markdown
    attributes:
      value: |
        感谢分享。Issue 和 GitHub 用户名默认公开，请不要填写姓名、学号、联系方式或可识别他人的信息。成绩和排名建议使用区间。

  - type: input
    id: cycle_year
    attributes:
      label: 考核年份
      description: 填写结果公布所在的四位自然年。
      placeholder: YYYY
    validations:
      required: true

  - type: input
    id: target
    attributes:
      label: 目标学院与专业
      placeholder: 学院 / 专业
    validations:
      required: true

  - type: textarea
    id: background
    attributes:
      label: 匿名化背景
      description: 可填写原专业、排名区间、相关基础和准备时长；全部可选。

  - type: checkboxes
    id: stages
    attributes:
      label: 涉及环节
      options:
        - label: 信息收集与报名
        - label: 笔试或机考
        - label: 面试
        - label: 结果与后续手续

  - type: textarea
    id: timeline
    attributes:
      label: 时间线与信息来源
      description: 涉及政策、日期和规则时，请附当年的官方链接。

  - type: textarea
    id: experience
    attributes:
      label: 经历正文
      description: 请区分亲身经历、转述、个人建议和不确定内容。
      placeholder: 准备过程、考核形式、考察主题、复盘与建议
    validations:
      required: true

  - type: dropdown
    id: outcome
    attributes:
      label: 是否公开结果
      options:
        - 不公开
        - 录取
        - 未录取
        - 主动放弃

  - type: input
    id: author_credit
    attributes:
      label: 页面署名
      description: 页面可写 GitHub 用户名、化名或“匿名贡献者”，但 Issue 记录仍公开。
      placeholder: 匿名贡献者

  - type: checkboxes
    id: confirmations
    attributes:
      label: 投稿确认
      options:
        - label: 内容为本人原创，或我已清楚说明来源与授权。
          required: true
        - label: 内容不含姓名、学号、联系方式、准考证号、人脸等个人信息。
          required: true
        - label: 内容不涉及仍在进行的考试、内部题库或其他非公开材料。
          required: true
        - label: 我同意原创部分按 CC BY 4.0 发布。
          required: true
        - label: 我理解 GitHub 用户名和本 Issue 默认公开。
          required: true
